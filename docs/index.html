<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🛡️ Safe Approval Guard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.9.0/ethers.umd.min.js"></script>
  <link rel="manifest" href="manifest.json">
  <meta name="safe-apps-init" content="true">
  <style>
    :root {
      --bg-primary: #1a1a2e;
      --bg-secondary: #16213e;
      --bg-card: #0f3460;
      --accent: #e94560;
      --accent-hover: #ff6b6b;
      --safe-green: #10b981;
      --safe-blue: #0080ff;
      --warning-yellow: #f59e0b;
      --danger-red: #ef4444;
      --text-primary: #ffffff;
      --text-secondary: #94a3b8;
      --border: #334155;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
      min-height: 100vh;
      color: var(--text-primary);
    }
    .app { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid var(--border); margin-bottom: 30px; flex-wrap: wrap; gap: 16px; }
    .logo { display: flex; align-items: center; gap: 10px; font-size: 24px; font-weight: bold; }
    .logo-icon { font-size: 32px; }
    .btn { padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); transform: translateY(-2px); }
    .btn-safe { background: var(--safe-blue); color: white; }
    .btn-safe:hover { background: #0099ff; transform: translateY(-2px); }
    .btn-secondary { background: var(--bg-card); color: white; border: 1px solid var(--border); }
    .btn-danger { background: var(--danger-red); color: white; font-size: 12px; padding: 8px 16px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .card { background: var(--bg-card); border-radius: 12px; padding: 24px; border: 1px solid var(--border); margin-bottom: 20px; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
    .card-title { font-size: 18px; font-weight: 600; }
    .wallet-info { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .wallet-address { font-family: monospace; font-size: 14px; color: var(--text-secondary); }
    .safe-badge { background: var(--safe-blue); color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; }
    .summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: var(--bg-secondary); border-radius: 12px; padding: 20px; text-align: center; border: 1px solid var(--border); }
    .stat-value { font-size: 32px; font-weight: bold; margin-bottom: 4px; }
    .stat-label { font-size: 14px; color: var(--text-secondary); }
    .stat-safe .stat-value { color: var(--safe-green); }
    .stat-unknown .stat-value { color: var(--warning-yellow); }
    .stat-risky .stat-value { color: var(--danger-red); }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 16px; text-align: left; border-bottom: 1px solid var(--border); }
    th { color: var(--text-secondary); font-weight: 500; font-size: 14px; }
    .token-info { display: flex; align-items: center; gap: 12px; }
    .token-icon { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; }
    .token-details h4 { font-size: 14px; margin-bottom: 2px; }
    .token-details span { font-size: 12px; color: var(--text-secondary); font-family: monospace; }
    .spender-name { font-weight: 500; }
    .spender-address { font-size: 12px; color: var(--text-secondary); font-family: monospace; }
    .risk-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .risk-safe { background: rgba(16, 185, 129, 0.2); color: var(--safe-green); }
    .risk-unknown { background: rgba(245, 158, 11, 0.2); color: var(--warning-yellow); }
    .risk-risky { background: rgba(239, 68, 68, 0.2); color: var(--danger-red); }
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px; gap: 16px; }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 60px; color: var(--text-secondary); }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    select { padding: 10px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-secondary); color: white; font-size: 14px; }
    .alert { padding: 16px; border-radius: 8px; margin-bottom: 16px; }
    .alert-error { background: rgba(239, 68, 68, 0.2); border: 1px solid var(--danger-red); }
    .alert-success { background: rgba(16, 185, 129, 0.2); border: 1px solid var(--safe-green); }
    .alert-info { background: rgba(0, 128, 255, 0.2); border: 1px solid var(--safe-blue); }
    .connect-options { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; margin-top: 24px; }
    .connect-card { background: var(--bg-secondary); border-radius: 12px; padding: 24px; border: 1px solid var(--border); text-align: center; min-width: 200px; cursor: pointer; transition: all 0.2s; }
    .connect-card:hover { border-color: var(--accent); transform: translateY(-4px); }
    .connect-card h3 { margin-top: 16px; font-size: 18px; }
    .connect-card p { color: var(--text-secondary); font-size: 14px; margin-top: 8px; }
    .connect-icon { font-size: 48px; }
    @media (max-width: 768px) { .summary { grid-template-columns: repeat(2, 1fr); } th, td { padding: 12px 8px; } .connect-options { flex-direction: column; } }
  </style>
</head>
<body>
  <div class="app" id="app">
    <header class="header">
      <div class="logo">
        <span class="logo-icon">🛡️</span>
        <span>Safe Approval Guard</span>
      </div>
      <div class="header-actions" id="header-actions">
        <button class="btn btn-primary" onclick="connectWallet()">🔗 Connect Wallet</button>
      </div>
    </header>

    <div id="content">
      <!-- Content rendered by JS -->
    </div>
  </div>

  <script>
    // ========================================
    // SAFE APPS SDK - Proper Implementation
    // ========================================
    const SDK_VERSION = 'safe-apps-sdk';
    const SDK_VERSION_NUM = '1.0.0';
    
    // Communication channels
    const DEV匙Y = {
      SAME_PAGE: 0,
      PARENT_POPUP: 1,
      PARENT_IFRAME: 2,
    };

    class SafeAppsSDK {
      constructor() {
        this._handlers = {};
        this._idCounter = 0;
        this._isInitialized = false;
        this._safeInfo = null;
        
        // Listen for messages from Safe
        window.addEventListener('message', this._handleMessage.bind(this));
        
        // Signal ready to Safe
        this._signalReady();
      }
      
      _generateId() {
        return ++this._idCounter;
      }
      
      _signalReady() {
        // Send initialization signal to parent
        if (window.parent !== window) {
          window.parent.postMessage({
            sdkVersion: SDK_VERSION,
            id: this._generateId(),
            method: 'onSafeInfoRequest',
            params: {}
          }, '*');
        }
      }
      
      _handleMessage(event) {
        if (!event.data) return;
        
        const { id, method, params, sdkVersion } = event.data;
        
        // Handle Safe environment info response
        if (method === 'onSafeInfo' || method === 'setSafeInfo') {
          this._isInitialized = true;
          this._safeInfo = params;
          this._safeInfo.chainId = typeof params.chainId === 'string' 
            ? parseInt(params.chainId, 16) 
            : params.chainId;
          
          console.log('Safe Info received:', this._safeInfo);
          
          // Dispatch custom event
          window.dispatchEvent(new CustomEvent('safeInfoReceived', { 
            detail: this._safeInfo 
          }));
        }
        
        // Handle transaction response
        if (method === 'sendTransactions' || method === 'txConfirm') {
          if (this._handlers[id]) {
            this._handlers[id](params);
            delete this._handlers[id];
          }
        }
      }
      
      async getSafeInfo() {
        // If already cached, return
        if (this._safeInfo) return this._safeInfo;
        
        // Request safe info from parent
        return new Promise((resolve, reject) => {
          const id = this._generateId();
          
          const handler = (event) => {
            if (event.data && event.data.id === id && event.data.method === 'onSafeInfo') {
              window.removeEventListener('message', handler);
              resolve(event.data.params);
            }
          };
          
          window.addEventListener('message', handler);
          
          // Send request
          if (window.parent !== window) {
            window.parent.postMessage({
              sdkVersion: SDK_VERSION,
              id: id,
              method: 'getSafeInfo',
              params: {}
            }, '*');
          }
          
          // Timeout
          setTimeout(() => {
            window.removeEventListener('message', handler);
            reject(new Error('getSafeInfo timeout'));
          }, 3000);
        });
      }
      
      async getEnvironmentInfo() {
        return new Promise((resolve, reject) => {
          const id = this._generateId();
          
          const handler = (event) => {
            if (event.data && event.data.id === id) {
              window.removeEventListener('message', handler);
              resolve(event.data.params);
            }
          };
          
          window.addEventListener('message', handler);
          
          if (window.parent !== window) {
            window.parent.postMessage({
              sdkVersion: SDK_VERSION,
              id: id,
              method: 'getEnvironmentInfo',
              params: {}
            }, '*');
          }
          
          setTimeout(() => {
            window.removeEventListener('message', handler);
            reject(new Error('getEnvironmentInfo timeout'));
          }, 3000);
        });
      }
      
      sendTransactions(txs) {
        return new Promise((resolve, reject) => {
          const id = this._generateId();
          this._handlers[id] = resolve;
          
          if (window.parent !== window) {
            window.parent.postMessage({
              sdkVersion: SDK_VERSION,
              id: id,
              method: 'sendTransactions',
              params: { txs }
            }, '*');
          } else {
            reject(new Error('Not running in Safe environment'));
          }
          
          setTimeout(() => {
            if (this._handlers[id]) {
              delete this._handlers[id];
              reject(new Error('Transaction timeout'));
            }
          }, 60000);
        });
      }
      
      isRunningInSafe() {
        return window.parent !== window;
      }
    }

    // Initialize SDK globally
    const sdk = new SafeAppsSDK();
    
    // Expose for debugging
    window.__safeAppsSDK = sdk;

    // ============ CONSTANTS ============
    const CHAINS = {
      1: { name: 'Ethereum', rpc: 'https://eth.llamarpc.com', explorer: 'https://etherscan.io' },
      42161: { name: 'Arbitrum', rpc: 'https://arb1.arbitrum.io/rpc', explorer: 'https://arbiscan.io' },
      8453: { name: 'Base', rpc: 'https://mainnet.base.org', explorer: 'https://basescan.org' },
      137: { name: 'Polygon', rpc: 'https://polygon-rpc.com', explorer: 'https://polygonscan.io' },
      10: { name: 'Optimism', rpc: 'https://mainnet.optimism.io', explorer: 'https://optimistic.etherscan.io' },
      324: { name: 'zkSync Era', rpc: 'https://zksync-mainnet.g.alchemy.com/v2/demo', explorer: 'https://explorer.zksync.io' },
      59144: { name: 'Linea', rpc: 'https://linea-mainnet.infura.io/v3/demo', explorer: 'https://lineascan.build' },
      56: { name: 'BNB Chain', rpc: 'https://bsc-dataseed.binance.org', explorer: 'https://bscscan.com' },
      43114: { name: 'Avalanche', rpc: 'https://api.avax.network/ext/bc/C/rpc', explorer: 'https://snowtrace.io' },
      100: { name: 'Gnosis', rpc: 'https://rpc.gnosischain.com', explorer: 'https://gnosisscan.io' },
    };

    const TRUSTED_SPENDERS = {
      '0x7a250d5630B4cF539739dF2C5dAcb4c659F2488D': 'Uniswap V2 Router',
      '0xE592427A0AEce92De3Edee1F18E0157C05861564': 'Uniswap V3 Router',
      '0xd9e1cE17f2641f24aE83637ab66a2cca9C378B9F': 'SushiSwap Router',
      '0x1111111254eeb25477b68fb85ed929f73a960582': '1inch V5 Router',
      '0xDef1C0ded9bec7F1a1670819833240f027b25EfF': '0x Exchange Proxy',
      '0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48': 'USDC (ERC20)',
      '0x6B175474E89094C44Da98b954EedeAC495271d0F': 'DAI (ERC20)',
    };

    const TOKENS = [
      { address: '0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48', symbol: 'USDC', decimals: 6 },
      { address: '0x6B175474E89094C44Da98b954EedeAC495271d0F', symbol: 'DAI', decimals: 18 },
      { address: '0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2', symbol: 'WETH', decimals: 18 },
      { address: '0x2260FAC5E5542a773Aa44fBCfedf7C193bc2C599', symbol: 'WBTC', decimals: 8 },
      { address: '0x514910771AF9Ca656af840dff83E8264EcF986CA', symbol: 'LINK', decimals: 18 },
      { address: '0x1f9840a85d5af5bf1d1762f925bdaddc4201f984', symbol: 'UNI', decimals: 18 },
      { address: '0x7fc66500c84a76ad7e9c93437bfc5ac33e2ddae9', symbol: 'AAVE', decimals: 18 },
      { address: '0x509Ee0d083DdF8AC028f2a56731412edD63223B9', symbol: 'stETH', decimals: 18 },
    ];

    const ERC20_ABI = [
      'function allowance(address owner, address spender) view returns (uint256)',
      'function approve(address spender, uint256 amount) returns (bool)',
    ];

    // ============ STATE ============
    let provider = null;
    let signer = null;
    let account = null;
    let chainId = 1;
    let isSafeWallet = false;
    let safeInfo = null;

    // ============ INIT ============
    async function init() {
      renderLoading('Detecting environment...');
      
      // Check if running inside Safe Wallet via SDK
      if (sdk.isRunningInSafe()) {
        console.log('Running inside iframe (potential Safe environment)');
        
        try {
          const info = await sdk.getSafeInfo();
          if (info && info.safeAddress) {
            isSafeWallet = true;
            safeInfo = info;
            account = info.safeAddress;
            chainId = typeof info.chainId === 'string' 
              ? parseInt(info.chainId, 16) 
              : info.chainId;
            
            console.log('Safe Wallet detected:', safeInfo);
            
            // For Safe, we use the provider from window.ethereum
            if (window.ethereum) {
              provider = new ethers.BrowserProvider(window.ethereum);
              try {
                signer = await provider.getSigner();
              } catch (e) {
                console.log('Signer not available yet:', e.message);
              }
            }
            
            renderHeader();
            scanApprovals();
            return;
          }
        } catch (e) {
          console.log('Safe detection failed:', e.message);
        }
      }
      
      // Not in Safe - show welcome screen
      renderWelcome();
    }

    // ============ CONNECT ============
    async function connectWallet() {
      if (isSafeWallet) {
        renderHeader();
        scanApprovals();
        return;
      }
      
      if (window.ethereum) {
        try {
          provider = new ethers.BrowserProvider(window.ethereum);
          const accounts = await provider.send('eth_requestAccounts', []);
          signer = await provider.getSigner();
          account = accounts[0];
          const network = await provider.getNetwork();
          chainId = Number(network.chainId);

          window.ethereum.on('accountsChanged', handleAccountsChanged);
          window.ethereum.on('chainChanged', handleChainChanged);

          renderHeader();
          scanApprovals();
        } catch (err) {
          alert('Connection failed: ' + err.message);
        }
      } else {
        alert('Please install MetaMask or open this app inside Safe Wallet!');
      }
    }

    function handleAccountsChanged(accounts) {
      if (accounts.length === 0) {
        disconnect();
      } else {
        account = accounts[0];
        provider = new ethers.BrowserProvider(window.ethereum);
        provider.getSigner().then(s => signer = s);
        renderHeader();
        scanApprovals();
      }
    }

    function handleChainChanged(chain) {
      chainId = parseInt(chain, 16);
      renderHeader();
      scanApprovals();
    }

    function disconnect() {
      account = null;
      provider = null;
      signer = null;
      isSafeWallet = false;
      safeInfo = null;
      renderHeader();
      renderWelcome();
    }

    // ============ SCAN ============
    async function scanApprovals() {
      if (!account) return;

      renderLoading('Scanning approvals...');

      try {
        const chainConfig = CHAINS[chainId] || CHAINS[1];
        const rpcProvider = new ethers.JsonRpcProvider(chainConfig.rpc);
        const wallet = ethers.getAddress(account);
        const results = [];

        for (const token of TOKENS) {
          try {
            const contract = new ethers.Contract(token.address, ERC20_ABI, rpcProvider);
            
            for (const [router, name] of Object.entries(TRUSTED_SPENDERS)) {
              try {
                const allowance = await contract.allowance(wallet, router);
                
                if (allowance > 0n) {
                  const formatted = ethers.formatUnits(allowance, token.decimals);
                  const isUnlimited = allowance > ethers.parseUnits('1000000', token.decimals);
                  
                  results.push({
                    tokenAddress: token.address,
                    tokenSymbol: token.symbol,
                    spender: router,
                    spenderName: name,
                    allowance: formatted,
                    isUnlimited,
                    riskLevel: isUnlimited ? 'unknown' : 'safe',
                  });
                }
              } catch (e) {
                // Skip errors
              }
            }
          } catch (e) {
            console.log(`Error scanning ${token.symbol}:`, e);
          }
        }

        renderApprovals(results);
      } catch (err) {
        renderError(err.message);
      }
    }

    // ============ REVOKE ============
    async function revokeApproval(tokenAddress, spender) {
      // Build transaction data
      const erc20Interface = new ethers.Interface(ERC20_ABI);
      const data = erc20Interface.encodeFunctionData('approve', [spender, 0]);
      
      const tx = {
        to: tokenAddress,
        value: '0',
        data: data,
        operation: 0, // CALL
      };

      // If running in Safe, send via SDK
      if (isSafeWallet) {
        try {
          const result = await sdk.sendTransactions([tx]);
          alert('Revoke transaction submitted to Safe for multi-sig approval!\n\nTransaction ID: ' + JSON.stringify(result));
          setTimeout(scanApprovals, 3000);
        } catch (err) {
          alert('Safe revoke failed: ' + err.message);
        }
        return;
      }

      // Regular wallet
      if (!signer) {
        alert('Please connect your wallet first!');
        return;
      }

      try {
        const contract = new ethers.Contract(tokenAddress, ERC20_ABI, signer);
        const txResult = await contract.approve(spender, 0);
        
        alert('Revocation tx submitted! Hash: ' + txResult.hash);
        await txResult.wait();
        alert('Revocation confirmed!');
        scanApprovals();
      } catch (err) {
        alert('Revoke failed: ' + err.message);
      }
    }

    // ============ RENDER ============
    function renderHeader() {
      const actionsEl = document.getElementById('header-actions');
      
      if (account) {
        const shortAddr = account.slice(0, 6) + '...' + account.slice(-4);
        const safeBadge = isSafeWallet ? '<span class="safe-badge">🏠 Safe Wallet</span>' : '';
        
        actionsEl.innerHTML = `
          <div class="wallet-info">
            ${safeBadge}
            <select onchange="switchChain(this.value)" ${isSafeWallet ? 'disabled' : ''}>
              ${Object.entries(CHAINS).map(([id, chain]) => 
                `<option value="${id}" ${id == chainId ? 'selected' : ''}>${chain.name}</option>`
              ).join('')}
            </select>
            <span class="wallet-address">${shortAddr}</span>
            <button class="btn btn-secondary" onclick="disconnect()">Disconnect</button>
          </div>
        `;
      } else {
        actionsEl.innerHTML = `<button class="btn btn-primary" onclick="connectWallet()">🔗 Connect Wallet</button>`;
      }
    }

    function switchChain(newChainId) {
      chainId = parseInt(newChainId);
      scanApprovals();
    }

    function renderLoading(message) {
      document.getElementById('content').innerHTML = `
        <div class="summary">
          <div class="stat-card"><div class="stat-value">-</div><div class="stat-label">Total</div></div>
          <div class="stat-card stat-safe"><div class="stat-value">-</div><div class="stat-label">🟢 Safe</div></div>
          <div class="stat-card stat-unknown"><div class="stat-value">-</div><div class="stat-label">🟡 Unknown</div></div>
          <div class="stat-card stat-risky"><div class="stat-value">-</div><div class="stat-label">🔴 Risky</div></div>
        </div>
        <div class="card">
          <div class="loading">
            <div class="spinner"></div>
            <p>${message || 'Loading...'}</p>
          </div>
        </div>
      `;
    }

    function renderApprovals(approvals) {
      const safe = approvals.filter(a => a.riskLevel === 'safe').length;
      const unknown = approvals.filter(a => a.riskLevel === 'unknown').length;
      const risky = approvals.filter(a => a.riskLevel === 'risky').length;
      const chainName = CHAINS[chainId]?.name || `Chain ${chainId}`;
      const explorer = CHAINS[chainId]?.explorer || 'https://etherscan.io';

      document.getElementById('content').innerHTML = `
        ${isSafeWallet ? `
          <div class="alert alert-info">
            🏠 <strong>Safe Wallet Connected</strong> — Revoke transactions will be submitted as multi-sig proposals for owner approval.
          </div>
        ` : ''}
        <div class="summary">
          <div class="stat-card"><div class="stat-value">${approvals.length}</div><div class="stat-label">Total Approvals</div></div>
          <div class="stat-card stat-safe"><div class="stat-value">${safe}</div><div class="stat-label">🟢 Safe</div></div>
          <div class="stat-card stat-unknown"><div class="stat-value">${unknown}</div><div class="stat-label">🟡 Unknown</div></div>
          <div class="stat-card stat-risky"><div class="stat-value">${risky}</div><div class="stat-label">🔴 Risky</div></div>
        </div>
        <div class="card">
          <div class="card-header">
            <h2 class="card-title">Token Approvals on ${chainName}</h2>
            <button class="btn btn-primary" onclick="scanApprovals()">🔄 Scan Again</button>
          </div>
          ${approvals.length === 0 ? `
            <div class="empty">
              <div class="empty-icon">✨</div>
              <p>No active approvals found!</p>
            </div>
          ` : `
            <table>
              <thead>
                <tr>
                  <th>Token</th>
                  <th>Approved To</th>
                  <th>Allowance</th>
                  <th>Risk</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody>
                ${approvals.map((a, i) => `
                  <tr>
                    <td>
                      <div class="token-info">
                        <div class="token-icon">${a.tokenSymbol.slice(0, 2)}</div>
                        <div class="token-details">
                          <h4>${a.tokenSymbol}</h4>
                          <a href="${explorer}/token/${a.tokenAddress}" target="_blank" style="color: var(--text-secondary); font-size: 12px;">${a.tokenAddress.slice(0, 10)}... ↗</a>
                        </div>
                      </div>
                    </td>
                    <td>
                      <div class="spender-name">${a.spenderName}</div>
                      <a href="${explorer}/address/${a.spender}" target="_blank" class="spender-address">${a.spender.slice(0, 12)}... ↗</a>
                    </td>
                    <td>${a.isUnlimited ? '∞ Unlimited' : a.allowance}</td>
                    <td><span class="risk-badge risk-${a.riskLevel}">${a.riskLevel === 'safe' ? '🟢 Safe' : a.riskLevel === 'unknown' ? '🟡 Unknown' : '🔴 Risky'}</span></td>
                    <td><button class="btn btn-danger" onclick="revokeApproval('${a.tokenAddress}', '${a.spender}')">🚫 Revoke</button></td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          `}
        </div>
      `;
    }

    function renderError(message) {
      document.getElementById('content').innerHTML = `
        <div class="alert alert-error">⚠️ ${message}</div>
        <button class="btn btn-primary" onclick="scanApprovals()">Try Again</button>
      `;
    }

    function renderWelcome() {
      document.getElementById('content').innerHTML = `
        <div class="card">
          <div class="empty">
            <div class="empty-icon">🔐</div>
            <h2>Connect Your Wallet</h2>
            <p style="color: var(--text-secondary); margin-top: 8px;">
              Scan and manage token approvals for your EOA or Safe Wallet
            </p>
            <div class="connect-options">
              <div class="connect-card" onclick="connectWallet()">
                <div class="connect-icon">🦊</div>
                <h3>MetaMask</h3>
                <p>Connect via browser extension</p>
              </div>
              <div class="connect-card" onclick="openInSafe()">
                <div class="connect-icon">🏠</div>
                <h3>Safe Wallet</h3>
                <p>Open as Safe App (multi-sig)</p>
              </div>
            </div>
          </div>
        </div>
        <div class="card">
          <h3 class="card-title">✨ Features</h3>
          <ul style="margin-top: 16px; color: var(--text-secondary); line-height: 2;">
            <li>🔍 Scan all ERC20 token approvals</li>
            <li>🎯 Risk scoring: 🟢 Safe / 🟡 Unknown / 🔴 Risky</li>

          </ul>

            <li>Click <strong>"Add custom Safe App"</strong></li>
            <li>Paste URL: <code style="background: var(--bg-secondary); padding: 4px 8px; border-radius: 4px;">${window.location.href}</code></li>

    function openInSafe() {
      const currentUrl = encodeURIComponent(window.location.href);
      window.open(`https://app.safe.global/apps/open?safe=eth:0x...&url=${currentUrl}`, '_blank');
    }

    // ============ START ============
    init();
  </script>
</body>
</html>
